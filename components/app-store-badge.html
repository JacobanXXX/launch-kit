<!--
  App Store + Google Play badges — 정확한 SVG + CSS

  본인 사이트의 hero 또는 product 섹션에 그대로 떠가서 쓰세요.
  iOS/Android 출시 시 transparent CTA로 conversion ↑.
-->

<style>
  .app-store-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 22px 12px 18px;
    background: white;
    color: #1d1d1f;
    border-radius: 999px;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.01em;
    text-decoration: none;
    transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), background 0.3s ease;
  }
  .app-store-badge:hover {
    transform: translateY(-1px);
    background: rgba(255,255,255,0.92);
  }
  .app-store-badge svg { width: 18px; height: 18px; }
  .app-store-badge-text {
    display: flex; flex-direction: column;
    line-height: 1.05;
  }
  .app-store-badge-eyebrow {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: #6e6e73;
    margin-bottom: 1px;
  }
</style>

<!-- Apple App Store -->
<a href="https://apps.apple.com/{{COUNTRY}}/app/{{APP_NAME}}/id{{APPLE_APP_ID}}"
   target="_blank" rel="noopener"
   class="app-store-badge"
   aria-label="Download on the App Store">
  <svg viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true">
    <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zM236 105.7c25.4-30.1 23.1-57.5 22.4-67.4-22.5 1.3-48.5 15.3-63.3 32.5-16.3 18.4-25.9 41.2-23.8 64.6 24.3 1.9 46.5-10.6 64.7-29.7z"/>
  </svg>
  <span class="app-store-badge-text">
    <span class="app-store-badge-eyebrow">Download on the</span>
    <span>App Store</span>
  </span>
</a>

<!-- Google Play -->
<a href="https://play.google.com/store/apps/details?id={{ANDROID_PACKAGE_ID}}&hl=ko"
   target="_blank" rel="noopener"
   class="app-store-badge"
   aria-label="Get it on Google Play">
  <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true">
    <path d="M325.3 234.3L104.6 13l280.8 161.2-60.1 60.1zM47 0C34 6.8 25.3 19.2 25.3 35.3v441.3c0 16.1 8.7 28.5 21.7 35.3l256.6-256L47 0zm425.2 225.6l-58.9-34.1-65.7 64.5 65.7 64.5 60.1-34.1c18-14.3 18-46.5-1.2-60.8zM104.6 499l280.8-161.2-60.1-60.1L104.6 499z"/>
  </svg>
  <span class="app-store-badge-text">
    <span class="app-store-badge-eyebrow">GET IT ON</span>
    <span>Google Play</span>
  </span>
</a>

<!--
  변수:
  - {{COUNTRY}}: kr / us / jp 등
  - {{APP_NAME}}: 앱 슬러그 (예: "topikiq")
  - {{APPLE_APP_ID}}: 숫자만 (예: "6761719529")
  - {{ANDROID_PACKAGE_ID}}: 패키지명 (예: "com.topikiq.app")
-->
