<!--
  토스페이먼츠 — Payment Widget 통합 예시
  공식 문서: https://docs.tosspayments.com/guides/v2/payment-widget/integration

  필요한 것:
  1. 토스페이먼츠 가맹점 가입 → 클라이언트 키 받기
  2. 백엔드 서버 (결제 승인 API 호출용)
  3. 환불·웹훅 처리 endpoint
-->

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>결제 — {{COMPANY_BRAND}}</title>
<script src="https://js.tosspayments.com/v2/standard"></script>
</head>
<body>
  <div id="payment-method"></div>
  <div id="agreement"></div>
  <button id="payment-button">결제하기</button>

<script>
const clientKey = 'test_ck_REPLACE_WITH_YOUR_KEY'; // 토스페이먼츠 콘솔에서 발급
const customerKey = 'CUSTOMER_UNIQUE_ID';          // 회원 고유 ID (비회원은 anonymous-uuid)

(async () => {
  const tossPayments = TossPayments(clientKey);
  const widgets = tossPayments.widgets({ customerKey });

  // 결제 금액 설정
  await widgets.setAmount({
    currency: 'KRW',
    value: 50000,  // 결제 금액 (원)
  });

  // 결제수단 위젯 렌더
  await widgets.renderPaymentMethods({
    selector: '#payment-method',
    variantKey: 'DEFAULT',
  });

  // 약관 동의 위젯
  await widgets.renderAgreement({
    selector: '#agreement',
    variantKey: 'AGREEMENT',
  });

  // 결제 버튼
  document.getElementById('payment-button').addEventListener('click', async () => {
    try {
      await widgets.requestPayment({
        orderId: 'order-' + Date.now(),
        orderName: '{{COMPANY_BRAND}} 강의',
        successUrl: 'https://{{DOMAIN}}/payment/success',
        failUrl: 'https://{{DOMAIN}}/payment/fail',
        customerEmail: 'customer@example.com',
        customerName: '구매자명',
      });
    } catch (e) {
      console.error('결제 요청 실패:', e);
      alert('결제를 진행할 수 없습니다: ' + e.message);
    }
  });
})();
</script>

<!--
  ⚠️ 백엔드에서 꼭 해야 할 것:

  1. successUrl로 redirect 받으면 → 토스페이먼츠 결제 승인 API 호출 (실제 결제 확정)
     POST https://api.tosspayments.com/v1/payments/confirm
     Authorization: Basic Base64(secretKey + ':')
     Body: { paymentKey, orderId, amount }

  2. amount 값이 본인 DB의 주문 금액과 정확히 일치하는지 검증 (위변조 방지)

  3. 결제 정보를 본인 DB에 저장 (금액·orderId·승인일시)

  4. 환불 처리 endpoint 만들기:
     POST https://api.tosspayments.com/v1/payments/{paymentKey}/cancel

  5. 웹훅 endpoint 만들기 (가상계좌 입금 완료, 환불 완료 등 통지)
     URL을 토스페이먼츠 콘솔에 등록

  공식 문서:
  - 결제 승인: https://docs.tosspayments.com/reference/using-api/api-keys
  - 결제 취소: https://docs.tosspayments.com/reference/using-api/api-keys#결제-취소
  - 웹훅: https://docs.tosspayments.com/reference/webhook
-->
</body>
</html>
